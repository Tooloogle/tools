<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <meta name="robots" content="noindex" />
    <title>Tooloogle Web Components</title>
    <link href="_style.css" rel="stylesheet" />
    <script src="tools.js" type="module"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        // darkMode: 'class',
        theme: {},
      };
    </script>
  </head>

  <body class="p-5 dark:bg-gray-800 dark:text-slate-400">
    <!-- Header with Logo and Search -->
    <header
      class="flex flex-col sm:flex-row items-center justify-between mb-8 gap-4 border-b dark:border-gray-500 pb-5"
    >
      <!-- Logo on the left -->
      <div class="flex-shrink-0">
        <img
          src="/brand-logo.png"
          width="256"
          height="50"
          class="w-52 h-auto object-contain"
        />
      </div>

      <!-- Search box and controls in right -->
      <div class="max-w-2xl ml-auto w-full">
        <div class="relative">
          <svg
            class="absolute left-3 top-1/2 transform -translate-y-1/2 w-5 h-5 text-gray-400"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
            ></path>
          </svg>
          <input
            type="text"
            id="search-input"
            placeholder="Search and select a tool..."
            class="w-full pl-10 pr-10 py-3 border rounded-lg dark:bg-gray-700 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
          <svg
            id="clear-icon"
            class="absolute right-3 top-1/2 transform -translate-y-1/2 w-5 h-5 text-gray-400 cursor-pointer hover:text-gray-600 dark:hover:text-gray-200 hidden"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M6 18L18 6M6 6l12 12"
            ></path>
          </svg>
          <div
            id="dropdown"
            class="absolute z-10 w-full mt-2 bg-white dark:bg-gray-700 border dark:border-gray-600 rounded-lg shadow-lg max-h-96 overflow-y-auto hidden"
          >
            <div id="tools-list"></div>
          </div>
        </div>
        
        <!-- Full Width Toggle -->
        <div class="flex items-center mt-3">
          <label class="flex items-center cursor-pointer">
            <input
              type="checkbox"
              id="full-width-toggle"
              class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded focus:ring-blue-500 dark:focus:ring-blue-600 dark:ring-offset-gray-800 focus:ring-2 dark:bg-gray-700 dark:border-gray-600 cursor-pointer"
            />
            <span class="ml-2 text-sm text-gray-700 dark:text-gray-300">Full Width View</span>
          </label>
        </div>
      </div>
    </header>

    <!-- Tool Container -->
    <div class="flex justify-center">
      <div id="container">
        <div
          id="demo-container"
          class="p-4 shadow dark:shadow-lg border-none dark:bg-gray-700 rounded"
        ></div>
      </div>
    </div>

    <script type="module">
      const searchInput = document.getElementById('search-input');
      const dropdown = document.getElementById('dropdown');
      const toolsList = document.getElementById('tools-list');
      const clearIcon = document.getElementById('clear-icon');
      const fullWidthToggle = document.getElementById('full-width-toggle');

      let activeIndex = -1;
      let currentFiltered = [];

      // --- URL helpers ---
      function updateURL(tool, fullWidth) {
        const url = new URL(window.location);
        if (tool) url.searchParams.set('q', tool);
        if (fullWidth !== undefined) {
          fullWidth ? url.searchParams.set('f', '1') : url.searchParams.delete('f');
        }
        window.history.replaceState({}, '', url);
      }

      // --- Tool loading ---
      async function initTool(tool, updateUrl = true) {
        const container = document.getElementById('demo-container');
        const wrapper = document.getElementById('container');

        const fullWidthTools = [
          'qr-code-generator', 'javascript-beautifier', 'css-beautifier',
          'html-beautifier', 'json-viewer', 'csv-to-json-converter',
          'json-to-csv-converter', 'regex-expression-tester', 'resume-builder',
          'stylish-text-generator', 'svg-optimizer', 'email-template-generator',
        ];

        const forceFullWidth = fullWidthToggle?.checked || false;
        wrapper.className = (fullWidthTools.includes(tool) || forceFullWidth)
          ? 'w-full'
          : 'lg:w-2/5 pr-4 pl-4 md:w-3/5 pr-4 pl-4 sm:w-2/3 pr-4 pl-4 w-full';

        container.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;padding:3rem;color:#6b7280;">
          <svg width="24" height="24" viewBox="0 0 24 24" style="animation:spin 1s linear infinite;margin-right:0.5rem;">
            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" fill="none" stroke-dasharray="31.4 31.4" stroke-linecap="round"/>
          </svg>
          Loading ${tool.replace(/-/g, ' ')}…
        </div>`;

        try {
          const mod = await import(`../src/${tool}/${tool}.ts`);
          mod?.default?.();
          container.innerHTML = `<${tool}></${tool}>`;
          localStorage.setItem('demo-selected-tool', tool);
          if (updateUrl) updateURL(tool, forceFullWidth);
        } catch (err) {
          console.error('Error loading tool:', tool, err);
          container.innerHTML = `<div style="padding:2rem;text-align:center;color:#dc2626;">
            <p style="font-size:1.25rem;font-weight:600;">Failed to load "${tool.replace(/-/g, ' ')}"</p>
            <p style="color:#6b7280;margin-top:0.5rem;">${err.message || 'Module not found or failed to compile.'}</p>
          </div>`;
        }
      }

      // --- Dropdown rendering ---
      function renderTools(filteredTools) {
        toolsList.innerHTML = '';
        activeIndex = -1;
        currentFiltered = filteredTools;

        filteredTools.forEach((t, i) => {
          const div = document.createElement('div');
          div.className = 'px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-600 cursor-pointer capitalize';
          div.textContent = `${i + 1}. ${t.replace(/-/g, ' ')}`;
          div.dataset.index = i;
          div.dataset.tool = t;
          // Use mousedown (fires before blur) with preventDefault to keep focus on input
          div.addEventListener('mousedown', e => {
            e.preventDefault();
            selectTool(t);
          });
          div.addEventListener('mouseenter', () => {
            setActiveItem(i);
          });
          toolsList.appendChild(div);
        });
      }

      function selectTool(tool) {
        searchInput.value = tool.replace(/-/g, ' ');
        hideDropdown();
        clearIcon.classList.remove('hidden');
        initTool(tool);
      }

      function showDropdown() {
        dropdown.classList.remove('hidden');
      }

      function hideDropdown() {
        dropdown.classList.add('hidden');
        activeIndex = -1;
      }

      function setActiveItem(index) {
        const items = toolsList.children;
        // Remove highlight from all
        for (const item of items) {
          item.classList.remove('bg-gray-100', 'dark:bg-gray-600');
        }
        // Wrap around
        if (index < 0) index = items.length - 1;
        if (index >= items.length) index = 0;

        activeIndex = index;
        if (items[activeIndex]) {
          items[activeIndex].classList.add('bg-gray-100', 'dark:bg-gray-600');
          items[activeIndex].scrollIntoView({ block: 'nearest' });
        }
      }

      // --- Keyboard navigation (on the input itself) ---
      searchInput.addEventListener('keydown', e => {
        const isVisible = !dropdown.classList.contains('hidden');

        switch (e.key) {
          case 'ArrowDown':
            e.preventDefault();
            if (!isVisible) {
              // Open dropdown if closed
              const q = searchInput.value.trim().toLowerCase();
              const list = q
                ? tools.filter(t => t.replace(/-/g, ' ').toLowerCase().includes(q))
                : tools;
              renderTools(list);
              showDropdown();
            }
            setActiveItem(activeIndex + 1);
            break;

          case 'ArrowUp':
            e.preventDefault();
            if (isVisible) {
              setActiveItem(activeIndex - 1);
            }
            break;

          case 'Enter':
            if (isVisible && activeIndex >= 0 && activeIndex < currentFiltered.length) {
              e.preventDefault();
              selectTool(currentFiltered[activeIndex]);
            }
            break;

          case 'Escape':
            if (isVisible) {
              e.preventDefault();
              hideDropdown();
            }
            break;

          case 'Tab':
            hideDropdown();
            break;
        }
      });

      // --- Show dropdown on focus (re-filter with current text) ---
      searchInput.addEventListener('focus', () => {
        const query = searchInput.value.trim().toLowerCase();
        const filtered = query
          ? tools.filter(t => t.replace(/-/g, ' ').toLowerCase().includes(query))
          : tools;
        renderTools(filtered);
        showDropdown();
      });

      // --- Filter as user types ---
      searchInput.addEventListener('input', e => {
        const query = e.target.value.toLowerCase();
        const filtered = tools.filter(t =>
          t.replace(/-/g, ' ').toLowerCase().includes(query)
        );
        renderTools(filtered);
        showDropdown();
        clearIcon.classList.toggle('hidden', !e.target.value);
      });

      // --- Clear button ---
      clearIcon.addEventListener('mousedown', e => {
        e.preventDefault(); // keep focus on input
        searchInput.value = '';
        clearIcon.classList.add('hidden');
        renderTools(tools);
        showDropdown();
        searchInput.focus();
      });

      // --- Close dropdown on outside click ---
      document.addEventListener('mousedown', e => {
        if (!searchInput.contains(e.target) && !dropdown.contains(e.target)) {
          hideDropdown();
        }
      });

      // --- Full width toggle ---
      fullWidthToggle.addEventListener('change', () => {
        const currentTool = new URLSearchParams(window.location.search).get('q')
          || localStorage.getItem('demo-selected-tool');
        if (currentTool && tools.includes(currentTool)) {
          initTool(currentTool);
        }
      });

      // --- Initial load ---
      const urlParams = new URLSearchParams(window.location.search);
      const queryTool = urlParams.get('q');
      const queryFullWidth = urlParams.get('f') === '1';
      const lastSelectedTool = localStorage.getItem('demo-selected-tool');

      fullWidthToggle.checked = queryFullWidth;

      let toolToLoad = null;
      if (queryTool && tools.includes(queryTool)) {
        toolToLoad = queryTool;
      } else if (lastSelectedTool && tools.includes(lastSelectedTool)) {
        toolToLoad = lastSelectedTool;
      } else if (tools.length > 0) {
        toolToLoad = tools[tools.length - 1];
      }

      if (toolToLoad) {
        searchInput.value = toolToLoad.replace(/-/g, ' ');
        clearIcon.classList.remove('hidden');
        initTool(toolToLoad, false);
      }
    </script>
  </body>
</html>
