name: Publish @tooloogle/tools NPM Package

on:
  workflow_dispatch:

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v3
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Verify the integrity of provenance attestations and registry signatures for installed dependencies
        run: npm audit signatures

      - run: npm run build:tools

      - name: Prepare dist for release
        run: node postbuild.js

      - name: Run tests
        run: npm test

      - name: Verify ssr html generation
        run: node ./scripts/ssr-cli.js

      - name: Publish npm package
        run: |
          npm install -g @semantic-release/changelog @semantic-release/git semantic-release
          semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
